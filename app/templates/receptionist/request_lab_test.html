{% extends "layouts/base.html" %}

{% block title %}Request Lab Test - Hospital Management System{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h5 class="mb-0"><i class="fas fa-vial"></i> Request Lab Test</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="patient_id" class="form-label">Patient</label>
                            <select id="patient_id" name="patient_id" class="form-select" required>
                                <option value="">Select a patient</option>
                                {% for patient in patients %}
                                <option value="{{ patient.id }}">{{ patient.user.get_full_name() }} ({{ patient.patient_id }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="lab_test_id" class="form-label">Lab Test</label>
                            <select id="lab_test_id" name="lab_test_id" class="form-select" required>
                                <option value="">Select a lab test</option>
                                {% for test in available_tests %}
                                <option value="{{ test.id }}">{{ test.test_name }} - {{ test.test_code }} ({{ test.price | round(2) }} USD)</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="notes" class="form-label">Notes / Instructions</label>
                            <textarea id="notes" name="notes" class="form-control" rows="3" placeholder="Optional notes for lab staff"></textarea>
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <a href="{{ url_for('receptionist.dashboard') }}" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Back to Dashboard
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-paper-plane"></i> Request Lab Test
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
