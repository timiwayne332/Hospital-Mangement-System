{% extends "layouts/base.html" %}

{% block title %}Edit Profile - Hospital Management System{% endblock %}

{% block content %}
<h2 class="mb-4"><i class="fas fa-user-edit"></i> Edit Profile</h2>

<div class="row">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body p-4">
                <form method="POST">
                    <h5 class="mb-3">Personal Information</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="first_name" name="first_name" value="{{ current_user.first_name or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="last_name" name="last_name" value="{{ current_user.last_name or '' }}">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone</label>
                        <input type="tel" class="form-control" id="phone" name="phone" value="{{ current_user.phone or '' }}">
                    </div>
                    
                    <hr>
                    <h5 class="mb-3">Health Information</h5>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="date_of_birth" class="form-label">Date of Birth</label>
                            <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" value="{{ patient.date_of_birth.strftime('%Y-%m-%d') if patient.date_of_birth else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="gender" class="form-label">Gender</label>
                            <select class="form-select" id="gender" name="gender">
                                <option value="">Select Gender</option>
                                <option value="Male" {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
                                <option value="Female" {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
                                <option value="Other" {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="blood_group" class="form-label">Blood Group</label>
                            <select class="form-select" id="blood_group" name="blood_group">
                                <option value="">Select Blood Group</option>
                                <option value="A+" {% if patient.blood_group == 'A+' %}selected{% endif %}>A+</option>
                                <option value="A-" {% if patient.blood_group == 'A-' %}selected{% endif %}>A-</option>
                                <option value="B+" {% if patient.blood_group == 'B+' %}selected{% endif %}>B+</option>
                                <option value="B-" {% if patient.blood_group == 'B-' %}selected{% endif %}>B-</option>
                                <option value="O+" {% if patient.blood_group == 'O+' %}selected{% endif %}>O+</option>
                                <option value="O-" {% if patient.blood_group == 'O-' %}selected{% endif %}>O-</option>
                                <option value="AB+" {% if patient.blood_group == 'AB+' %}selected{% endif %}>AB+</option>
                                <option value="AB-" {% if patient.blood_group == 'AB-' %}selected{% endif %}>AB-</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="address" class="form-label">Address</label>
                        <input type="text" class="form-control" id="address" name="address" value="{{ patient.address or '' }}">
                    </div>
                    
                    <div class="mb-3">
                        <label for="allergies" class="form-label">Known Allergies</label>
                        <textarea class="form-control" id="allergies" name="allergies" rows="2">{{ patient.allergies or '' }}</textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="medical_history" class="form-label">Medical History</label>
                        <textarea class="form-control" id="medical_history" name="medical_history" rows="3">{{ patient.medical_history or '' }}</textarea>
                    </div>
                    
                    <hr>
                    <h5 class="mb-3">Emergency Contact</h5>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="emergency_contact" class="form-label">Contact Name</label>
                            <input type="text" class="form-control" id="emergency_contact" name="emergency_contact" value="{{ patient.emergency_contact or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="emergency_contact_phone" class="form-label">Contact Phone</label>
                            <input type="tel" class="form-control" id="emergency_contact_phone" name="emergency_contact_phone" value="{{ patient.emergency_contact_phone or '' }}">
                        </div>
                    </div>
                    
                    <hr>
                    <h5 class="mb-3">Insurance Information</h5>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="insurance_provider" class="form-label">Insurance Provider</label>
                            <input type="text" class="form-control" id="insurance_provider" name="insurance_provider" value="{{ patient.insurance_provider or '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="insurance_number" class="form-label">Insurance Number</label>
                            <input type="text" class="form-control" id="insurance_number" name="insurance_number" value="{{ patient.insurance_number or '' }}">
                        </div>
                    </div>
                    
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                        <a href="{{ url_for('patient.profile') }}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
