{% extends "layouts/base.html" %}

{% block title %}Create Prescription - Hospital Management System{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="row">
        <div class="col-md-10 mx-auto">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">
                        <i class="fas fa-prescription-bottle"></i> Create Prescription for {{ patient.user.get_full_name() }}
                    </h5>
                </div>
                <div class="card-body">
                    
                    <form method="POST">
                        <!-- Patient Info -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label"><strong>Patient ID:</strong></label>
                                <input type="text" class="form-control" value="{{ patient.patient_id }}" disabled>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label"><strong>Contact:</strong></label>
                                <input type="text" class="form-control" value="{{ patient.user.phone }}" disabled>
                            </div>
                        </div>

                        <!-- Medical Record Link -->
                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label class="form-label"><strong>Link to Medical Record (Optional):</strong></label>
                                <select name="medical_record_id" class="form-control">
                                    <option value="">-- Select Medical Record --</option>
                                    {% for record in medical_records %}
                                    <option value="{{ record.id }}">{{ record.visit_date.strftime('%d %b %Y') }} - {{ record.diagnosis[:50] }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <!-- Prescribed Duration -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label"><strong>Prescribed Duration:</strong></label>
                                <input type="text" name="prescribed_duration" class="form-control" 
                                       placeholder="e.g., 10 days, 2 weeks" required>
                            </div>
                        </div>

                        <!-- Special Instructions -->
                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label class="form-label"><strong>Special Instructions:</strong></label>
                                <textarea name="instructions" class="form-control" rows="3" 
                                         placeholder="e.g., Take with food, avoid dairy, etc."></textarea>
                            </div>
                        </div>

                        <!-- Medicines Section -->
                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label class="form-label"><strong>Prescribed Medicines:</strong></label>
                                <button type="button" class="btn btn-sm btn-success float-end" onclick="addMedicineRow()">
                                    <i class="fas fa-plus"></i> Add Medicine
                                </button>
                                <table class="table table-bordered" id="medicinesTable">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Medicine Name</th>
                                            <th>Dosage</th>
                                            <th>Frequency</th>
                                            <th>Route</th>
                                            <th>Quantity</th>
                                            <th>Unit</th>
                                            <th>Action</th>
                                        </tr>
                                    </thead>
                                    <tbody id="medicinesBody">
                                        <tr>
                                            <td>
                                                <select name="medicine_id" class="form-control form-control-sm" required>
                                                    <option value="">Select Medicine</option>
                                                    {% for medicine in medicines %}
                                                    <option value="{{ medicine.id }}">{{ medicine.name }} ({{ medicine.generic_name }})</option>
                                                    {% endfor %}
                                                </select>
                                            </td>
                                            <td><input type="text" name="dosage" class="form-control form-control-sm" placeholder="500mg"></td>
                                            <td><input type="text" name="frequency" class="form-control form-control-sm" placeholder="2 times daily" required></td>
                                            <td>
                                                <select name="route" class="form-control form-control-sm">
                                                    <option value="oral">Oral</option>
                                                    <option value="injection">Injection</option>
                                                    <option value="topical">Topical</option>
                                                    <option value="inhalation">Inhalation</option>
                                                </select>
                                            </td>
                                            <td><input type="number" name="quantity" class="form-control form-control-sm" value="1" min="1" required></td>
                                            <td>
                                                <select name="unit" class="form-control form-control-sm">
                                                    <option value="tablet">Tablet</option>
                                                    <option value="capsule">Capsule</option>
                                                    <option value="ml">ML</option>
                                                    <option value="injection">Injection</option>
                                                </select>
                                            </td>
                                            <td><button type="button" class="btn btn-sm btn-danger" onclick="removeMedicineRow(this)"><i class="fas fa-trash"></i></button></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Form Actions -->
                        <div class="row">
                            <div class="col-md-12">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save"></i> Create Prescription
                                </button>
                                <a href="{{ url_for('doctor.patient_detail', patient_id=patient.id) }}" class="btn btn-secondary">
                                    <i class="fas fa-times"></i> Cancel
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function addMedicineRow() {
    const tbody = document.getElementById('medicinesBody');
    const newRow = document.createElement('tr');
    newRow.innerHTML = `
        <td>
            <select name="medicine_id" class="form-control form-control-sm" required>
                <option value="">Select Medicine</option>
                {% for medicine in medicines %}
                <option value="{{ medicine.id }}">{{ medicine.name }} ({{ medicine.generic_name }})</option>
                {% endfor %}
            </select>
        </td>
        <td><input type="text" name="dosage" class="form-control form-control-sm" placeholder="500mg"></td>
        <td><input type="text" name="frequency" class="form-control form-control-sm" placeholder="2 times daily" required></td>
        <td>
            <select name="route" class="form-control form-control-sm">
                <option value="oral">Oral</option>
                <option value="injection">Injection</option>
                <option value="topical">Topical</option>
                <option value="inhalation">Inhalation</option>
            </select>
        </td>
        <td><input type="number" name="quantity" class="form-control form-control-sm" value="1" min="1" required></td>
        <td>
            <select name="unit" class="form-control form-control-sm">
                <option value="tablet">Tablet</option>
                <option value="capsule">Capsule</option>
                <option value="ml">ML</option>
                <option value="injection">Injection</option>
            </select>
        </td>
        <td><button type="button" class="btn btn-sm btn-danger" onclick="removeMedicineRow(this)"><i class="fas fa-trash"></i></button></td>
    `;
    tbody.appendChild(newRow);
}

function removeMedicineRow(btn) {
    btn.closest('tr').remove();
}
</script>
{% endblock %}
